<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="oidcscan icon">
  <defs>
    <style>
      .shield { fill:#6366F1; }
      .shield-rim { fill:#4338CA; }
      .face { fill:#FFFFFF; }
      .scanline { fill:#CFE0FF; }
      .lens-ring { fill:none; stroke:#184E80; stroke-width:30; }
      .lens-glass { fill:#CFE9FF; fill-opacity:0.85; }
      .handle { fill:none; stroke:#FF7A2D; stroke-width:38; stroke-linecap:round; }
      .check { fill:none; stroke:#22A06B; stroke-width:26; stroke-linecap:round; stroke-linejoin:round; }
    </style>
  </defs>

  <!-- shield -->
  <path class="shield-rim" d="M300 30 L530 110 V320 C530 452 432 538 300 578 C168 538 70 452 70 320 V110 Z"/>
  <path class="shield" d="M300 58 L504 130 V318 C504 436 416 514 300 550 C184 514 96 436 96 318 V130 Z"/>
  <path class="face" d="M300 96 L468 156 V314 C468 412 396 478 300 510 C204 478 132 412 132 314 V156 Z"/>

  <!-- scanned config lines -->
  <rect class="scanline" x="180" y="180" width="240" height="26" rx="13"/>
  <rect class="scanline" x="180" y="228" width="180" height="26" rx="13"/>
  <rect class="scanline" x="180" y="276" width="210" height="26" rx="13"/>

  <!-- magnifier with passing check -->
  <circle class="lens-glass" cx="270" cy="330" r="78"/>
  <circle class="lens-ring" cx="270" cy="330" r="78"/>
  <line class="handle" x1="328" y1="388" x2="404" y2="464"/>
  <path class="check" d="M234 332 L262 360 L312 300"/>
</svg>
